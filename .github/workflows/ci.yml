name: Aperture CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- Job 1: Client-Side TypeScript Linting and Testing ---
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Client Dependencies
        run: npm ci

      - name: Static Analysis & Compilation Check
        run: npm run lint

      - name: Execute Client-Side Test Suite
        run: npm run test:client

  # --- Job 2: Backend Python Service Verification ---
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Backend Pytest Suite
        run: python3 -m backend.tests.run_tests
